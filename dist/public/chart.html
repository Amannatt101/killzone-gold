<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KILLZONE · XAUUSD Live Chart</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #0F1419; color: #9CA3AF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; border-bottom: 1px solid #1C2530; background: #0A0F14; }
    .logo { font-size: 13px; font-weight: 700; letter-spacing: 0.1em; }
    .logo .gold { color: #C49B30; }
    .logo .gray { color: #9CA3AF; }
    .nav { display: flex; gap: 8px; }
    .nav a { padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 500; text-decoration: none; }
    .nav .dash { color: #9CA3AF; background: #1C2530; }
    .nav .sig { color: #C49B30; background: rgba(196,155,48,0.12); border: 1px solid rgba(196,155,48,0.2); }
    .chart-wrap { height: calc(100vh - 41px); width: 100%; }
    .tradingview-widget-container { height: 100%; width: 100%; }
    .tradingview-widget-container__widget { height: calc(100% - 32px); width: 100%; }
  </style>
</head>
<body>
  <div class="header">
    <div style="display:flex;align-items:center;gap:12px">
      <span class="logo"><span class="gold">KILL</span><span class="gray">ZONE</span></span>
      <span style="color:#4B5563;font-size:12px">/</span>
      <span style="color:#9CA3AF;font-size:12px;font-weight:600">XAUUSD Live Chart</span>
    </div>
    <div class="nav">
      <a class="dash" href="index.html">Dashboard</a>
      <a class="sig" href="index.html#/signal">Signal</a>
    </div>
  </div>
  <div class="chart-wrap">
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
      {
        "autosize": true,
        "symbol": "OANDA:XAUUSD",
        "interval": "60",
        "timezone": "Europe/London",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "backgroundColor": "rgba(15, 20, 25, 1)",
        "gridColor": "rgba(28, 37, 48, 0.6)",
        "hide_top_toolbar": false,
        "hide_legend": false,
        "allow_symbol_change": false,
        "save_image": false,
        "calendar": false,
        "hide_volume": true,
        "support_host": "https://www.tradingview.com",
        "studies": ["STD;RSI"]
      }
      </script>
    </div>
  </div>
</body>
</html>
